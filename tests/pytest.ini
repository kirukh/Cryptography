[pytest]
# Test-Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output: zeig mir die geskippten Tests mit Begruendung
# Das ist wichtig, um zu sehen, ob XMSS-Tests aus dem richtigen Grund
# uebersprungen wurden.
addopts =
    -ra
    --strict-markers
    -v

# Custom markers - 'slow' kannst du selbst noch nutzen, wenn du z.B.
# einen Test 'leere den XMSS-Pool komplett' anlegen willst.
markers =
    slow: deactivate by default with `-m "not slow"`
    integration: end-to-end Tests die echtes liboqs brauchen
